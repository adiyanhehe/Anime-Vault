name: Legacy Release (disabled)

# Installer releases are built and published by electron-build.yml.
# Keeping this workflow manual-only prevents duplicate tag builds from racing
# against the supported release pipeline and creating failed Actions runs.
on:
  workflow_dispatch:

jobs:
  disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Use installer release workflow
        run: |
          echo "This legacy workflow is disabled."
          echo "Run .github/workflows/electron-build.yml to build and publish installers."
