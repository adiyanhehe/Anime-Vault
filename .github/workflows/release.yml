name: Legacy Release (disabled)

# Installer releases are built and uploaded by electron-build.yml.
# Keeping this manual-only avoids duplicate tag workflows competing to create
# the same GitHub Release.
on:
  workflow_dispatch:

jobs:
  disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Use Automated Installer Releases
        run: echo "Use .github/workflows/electron-build.yml for GitHub Releases."
