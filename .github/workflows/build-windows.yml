name: Build Windows Installer

on:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build Windows installer
        env:
          # Sign with the dev certificate tracked in the repo so the
          # auto-updater (electron-updater) can verify the binary against
          # `latest.yml` and install updates.
          CSC_LINK: ${{ github.workspace }}/animevault-code-signing.pfx
          CSC_KEY_PASSWORD: devpwd
          WIN_CSC_LINK: ${{ github.workspace }}/animevault-code-signing.pfx
          WIN_CSC_KEY_PASSWORD: devpwd
        run: npm run electron:build -- --win
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Installer
          path: release/**/*.exe
