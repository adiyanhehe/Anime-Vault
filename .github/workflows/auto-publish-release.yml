name: Auto Publish Release (disabled)

# electron-build.yml creates and publishes GitHub Releases directly.
# This old release-created hook is manual-only so it cannot fail after a
# successful automated installer release.
on:
  workflow_dispatch:

jobs:
  disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Use Automated Installer Releases
        run: echo "Use .github/workflows/electron-build.yml for automated GitHub Releases."
