name: Auto-Fix Submodule

on:
  workflow_dispatch:

jobs:
  fix-submodule:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Remove broken submodule
        run: |
          git rm --cached clean-repo 2>/dev/null || true
          
          if [ -f .gitmodules ]; then
            git config --file .gitmodules --remove-section submodule.clean-repo 2>/dev/null || true
            if [ ! -s .gitmodules ]; then
              git rm .gitmodules
            fi
          fi
      
      - name: Commit and push fix
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add -A
          git diff --cached --quiet || git commit -m "fix: remove broken submodule reference"
          git push origin main
