name: Cross-Platform Build & Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build Windows
        run: npm run electron:build:win
      
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: release/
          retention-days: 30

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build macOS
        run: npm run electron:build:mac
      
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: release/
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse-dev
      
      - name: Build Linux
        run: npm run electron:build:linux
      
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: release/
          retention-days: 30

  bump-version-and-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Get previous version
        id: previous-version
        run: |
          VERSION=$(grep '"version"' package.json | head -1 | sed 's/.*"version": "\([^"]*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Bump patch version
        id: new-version
        run: |
          OLD_VERSION=${{ steps.previous-version.outputs.version }}
          NEW_VERSION=$(echo $OLD_VERSION | awk -F. '{$NF=$NF+1; print}' OFS=.)
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          sed -i 's/"version": "'$OLD_VERSION'"/"version": "'$NEW_VERSION'"/g' package.json
      
      - name: Commit version bump
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add package.json
          git commit -m "chore: bump version to ${{ steps.new-version.outputs.version }}"
          git push
      
      - name: Create tag
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag v${{ steps.new-version.outputs.version }}
          git push origin v${{ steps.new-version.outputs.version }}
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.new-version.outputs.version }}
          name: Release v${{ steps.new-version.outputs.version }}
          body: |
            ## 🎉 AnimeVault v${{ steps.new-version.outputs.version }}
            
            ### 📦 Downloads
            - **Windows**: AnimeVault-Windows-x64.exe, AnimeVault-Windows-arm64.exe
            - **macOS**: AnimeVault-macOS-x64.dmg, AnimeVault-macOS-arm64.dmg
            - **Linux**: AnimeVault-Linux-x64.AppImage, AnimeVault-Linux-x64.deb
            
            ### ✨ Features & Fixes
            See commit history for details.
          files: |
            windows-builds/**
            macos-builds/**
            linux-builds/**
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
