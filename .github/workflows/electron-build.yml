name: Automated Installer Releases

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Publish a GitHub Release for this manual build'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  desktop:
    name: Desktop installer (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            args: --win
          - os: macos-latest
            name: macOS
            args: --mac
          - os: ubuntu-latest
            name: Linux
            args: --linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build installer without publishing
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run electron:build -- ${{ matrix.args }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: animevault-${{ matrix.name }}-installer
          path: release/**/*
          if-no-files-found: error

  android:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Ensure Android project exists
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Build Android release APK
        run: npm run android:build

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: animevault-Android-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [ desktop, android ]
    if: |
      always() &&
      (needs.desktop.result != 'cancelled' || needs.android.result != 'cancelled') &&
      (github.event_name == 'push' || inputs.publish_release == true)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download generated artifacts
        uses: actions/download-artifact@v4
        with:
          path: generated-release-assets
          merge-multiple: true

      - name: Publish release from artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ "$REF_TYPE" = "tag" ]; then
            TAG_NAME="$REF_NAME"
            RELEASE_TITLE="AnimeVault $REF_NAME"
          else
            SHORT_SHA="${GITHUB_SHA::7}"
            TAG_NAME="autobuild-${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
            RELEASE_TITLE="AnimeVault automated build ${GITHUB_RUN_NUMBER} (${SHORT_SHA})"
          fi

          mapfile -d '' RELEASE_FILES < <(find generated-release-assets -type f \
            ! -name 'builder-debug.yml' \
            ! -name 'builder-effective-config.yaml' \
            -print0)

          if [ "${#RELEASE_FILES[@]}" -eq 0 ]; then
            echo "No release files were generated."
            exit 1
          fi

          gh release create "$TAG_NAME" "${RELEASE_FILES[@]}" \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TITLE" \
            --generate-notes
