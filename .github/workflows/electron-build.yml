name: Automated Installer Releases

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  desktop:
    name: Desktop installer (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            args: --win
          - os: macos-latest
            name: macOS
            args: --mac
          - os: ubuntu-latest
            name: Linux
            args: --linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build installer
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            npm run electron:release -- ${{ matrix.args }}
          else
            npm run electron:build -- ${{ matrix.args }}
          fi

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: animevault-${{ matrix.name }}-installer
          path: |
            release/**/*
            !release/**/*.blockmap

  android:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Ensure Android project exists
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Build Android release APK
        run: npm run android:build

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: animevault-Android-apk
          path: android/app/build/outputs/apk/release/*.apk
