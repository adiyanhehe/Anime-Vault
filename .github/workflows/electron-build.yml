name: Automated Installer Builds & Releases

# This workflow is the "signal-driven" automation for Anime-Vault.
#
# Triggers (any one of these will fire the pipeline):
#   * push to main               -> rebuild installers and publish a release
#   * pull_request to main       -> build installers as PR artifacts (no release)
#   * workflow_dispatch          -> manual run from the Actions tab
#   * repository_dispatch        -> external signal, e.g.
#                                    curl -X POST \
#                                      -H "Accept: application/vnd.github+json" \
#                                      -H "Authorization: Bearer <PAT>" \
#                                      https://api.github.com/repos/adiyanhehe/Anime-Vault/dispatches \
#                                      -d '{"event_type":"release"}'
#
# Outputs:
#   * Windows / macOS / Linux / Android installers uploaded as Actions artifacts
#   * On non-PR runs: a vX.Y.Z tag (from package.json) and a GitHub Release
#     are created/updated with the installer assets, so the in-app download
#     page (https://github.com/<owner>/Anime-Vault/releases/latest/download/...)
#     always serves the newest build.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  repository_dispatch:
    types: [release]

permissions:
  contents: read
  actions: read

concurrency:
  group: installer-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  desktop:
    name: Desktop installer (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            args: --win
          - os: macos-latest
            name: macOS
            args: --mac
          - os: ubuntu-latest
            name: Linux
            args: --linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0



      - name: Cache Electron downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-${{ runner.os }}-

      - name: Install ImageMagick (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Install ImageMagick (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install imagemagick --yes --no-progress
          echo "ImageMagick installed"

      - name: Install ImageMagick (macOS)
        if: runner.os == 'macOS'
        run: brew install imagemagick

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run electron:build -- ${{ matrix.args }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: animevault-${{ matrix.name }}-installer
          if-no-files-found: error
          retention-days: 14
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.deb
            release/*.yml
            release/*.blockmap

  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Android SDK
        uses: android/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0
          ndk: 26.1.11579264
          platform-tools: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Ensure Android project exists
        run: npm run android:ensure

      - name: Build Android release APK
        run: npm run android:build

      - name: Normalize APK asset name
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          mapfile -t apks < <(find android/app/build/outputs/apk/release -maxdepth 1 -name '*.apk' 2>/dev/null | sort)
          if [ "${#apks[@]}" -eq 0 ]; then
            echo "No Android release APK was produced." >&2
            exit 1
          fi
          cp "${apks[0]}" "release/AnimeVault-Android.apk"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: animevault-Android-apk
          if-no-files-found: error
          retention-days: 14
          path: release/AnimeVault-Android.apk

  publish-release:
    name: Create release and publish downloads
    needs: [desktop, android]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      contents: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          tag="v${version}"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -f "${tag}" "${GITHUB_SHA}"
            git push origin "refs/tags/${tag}" --force
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ steps.release.outputs.tag }}"
          RELEASE_VERSION="${{ steps.release.outputs.version }}"

          mapfile -d '' files < <(find release-assets -type f -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No installer files found to upload." >&2
            exit 1
          fi

          cat > release-notes.md <<NOTES
          Automated AnimeVault installer release for ${RELEASE_TAG}.

          Download page links use the stable latest-release URLs, for example:
          - https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/AnimeVault-Windows-x64.exe
          - https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/AnimeVault-Android.apk

          Built from commit ${GITHUB_SHA}.
          NOTES

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "AnimeVault ${RELEASE_TAG}" \
              --notes-file release-notes.md \
              --target "${GITHUB_SHA}" \
              --latest
          else
            gh release create "${RELEASE_TAG}" \
              --target "${GITHUB_SHA}" \
              --title "AnimeVault ${RELEASE_TAG}" \
              --notes-file release-notes.md \
              --latest
          fi

          gh release upload "${RELEASE_TAG}" "${files[@]}" --clobber

          {
            echo "## Release downloads"
            echo
            echo "Published **AnimeVault ${RELEASE_TAG}** from commit \`${GITHUB_SHA}\`."
            echo
            echo "Download page URL pattern:"
            echo
            echo "\`https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/<asset-name>\`"
            echo
            echo "Uploaded ${#files[@]} release assets."
          } >> "${GITHUB_STEP_SUMMARY}"
