name: Automated Installer Releases

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: installer-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  desktop:
    name: Desktop installer (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            args: --win
          - os: macos-latest
            name: macOS
            args: --mac
          - os: ubuntu-latest
            name: Linux
            args: --linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run electron:build -- ${{ matrix.args }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: animevault-${{ matrix.name }}-installer
          if-no-files-found: error
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.deb
            release/*.yml
            release/*.blockmap

  android:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Build Android release APK
        run: npm run android:build

      - name: Normalize APK asset name
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          apk_count=$(find android/app/build/outputs/apk/release -maxdepth 1 -name '*.apk' | wc -l)
          if [ "${apk_count}" -ne 1 ]; then
            echo "Expected exactly one release APK, found ${apk_count}." >&2
            find android/app/build/outputs/apk/release -maxdepth 1 -type f >&2 || true
            exit 1
          fi
          cp android/app/build/outputs/apk/release/*.apk "release/AnimeVault-Android.apk"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: animevault-Android-apk
          if-no-files-found: error
          path: release/AnimeVault-Android.apk

  publish-release:
    name: Create tag and replace GitHub Release assets
    needs: [desktop, android]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            version=$(node -p "require('./package.json').version")
            tag="v${version}"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "Publishing installer assets to ${tag}"

      - name: Create version tag if missing
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          if git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" >/dev/null; then
            echo "Tag ${RELEASE_TAG} already exists locally."
          elif git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            git fetch origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "${RELEASE_TAG}" "${GITHUB_SHA}" -m "AnimeVault ${RELEASE_TAG}"
            git push origin "refs/tags/${RELEASE_TAG}"
          fi

      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create or update release and replace assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail

          if ! gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release create "${RELEASE_TAG}" \
              --target "${RELEASE_TAG}" \
              --title "AnimeVault ${RELEASE_TAG}" \
              --notes "Automated AnimeVault installer release for ${RELEASE_TAG}."
          fi

          mapfile -d '' files < <(find release-assets -type f -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No installer files were downloaded from build artifacts." >&2
            exit 1
          fi

          gh release upload "${RELEASE_TAG}" "${files[@]}" --clobber
