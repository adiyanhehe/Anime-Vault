name: Automated Installer Builds & Releases

# This workflow is the "signal-driven" automation for Anime-Vault.
#
# Triggers (any one of these will fire the pipeline):
#   * push to main               -> auto-bump version, rebuild installers and publish a release
#   * pull_request to main       -> build installers as PR artifacts (no release)
#   * workflow_dispatch          -> manual run from the Actions tab
#   * repository_dispatch        -> external signal, e.g.
#                                    curl -X POST \
#                                      -H "Accept: application/vnd.github+json" \
#                                      -H "Authorization: Bearer <PAT>" \
#                                      https://api.github.com/repos/adiyanhehe/Anime-Vault/dispatches \
#                                      -d '{"event_type":"release"}'
#
# Outputs:
#   * Windows / macOS / Linux / Android installers uploaded as Actions artifacts
#   * On non-PR runs: a vX.Y.Z tag (from package.json) and a GitHub Release
#     are created/updated with the installer assets, so the in-app download
#     page (https://github.com/<owner>/Anime-Vault/releases/latest/download/...)
#     always serves the newest build.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  repository_dispatch:
    types: [release]

permissions:
  contents: write
  actions: read

concurrency:
  group: installer-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version-bump:
    name: Auto-bump version
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Auto-increment patch version
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          current_version=$(node -p "require('./package.json').version")
          IFS='.' read -r major minor patch <<< "$current_version"
          new_patch=$((patch + 1))
          new_version="${major}.${minor}.${new_patch}"
          
          # Update package.json
          node -e "const pkg = require('./package.json'); pkg.version = '${new_version}'; require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"
          
          echo "version=${new_version}" >> "${GITHUB_OUTPUT}"
          echo "Bumped version from ${current_version} to ${new_version}"

      - name: Commit and push version bump
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }}" || true
          git push origin main || true

  desktop:
    name: Desktop installer (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    needs: [version-bump]
    if: always()
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            args: --win
          - os: macos-latest
            name: macOS
            args: --mac
          - os: ubuntu-latest
            name: Linux
            args: --linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache Electron downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-${{ runner.os }}-

      - name: Install ImageMagick (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Install ImageMagick (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install imagemagick --yes --no-progress
          echo "ImageMagick installed"

      - name: Install ImageMagick (macOS)
        if: runner.os == 'macOS'
        run: brew install imagemagick

      - name: Install dependencies
        run: npm install

      - name: Build installer
        shell: bash
        env:
          # Code signing. The .pfx is committed to the repo and the password
          # is hardcoded here so the auto-updater works out of the box.
          # SECURITY: this puts the .pfx password in git history. To lock it
          # down, set CSC_KEY_PASSWORD as a Repository Secret, then change
          # the line below to:
          #   CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_LINK: ${{ github.workspace }}/animevault-code-signing.pfx
          CSC_KEY_PASSWORD: Adiyan123@!
          WIN_CSC_LINK: ${{ github.workspace }}/animevault-code-signing.pfx
          WIN_CSC_KEY_PASSWORD: Adiyan123@!
          CSC_IDENTITY_AUTO_DISCOVERY: 'true'
        run: npm run electron:build -- ${{ matrix.args }}




      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: animevault-${{ matrix.name }}-installer
          if-no-files-found: error
          retention-days: 14
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.deb
            release/*.yml
            release/*.blockmap

      # Publish desktop files immediately to release (don't wait for other jobs)
      - name: Resolve version tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          tag="v${version}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Publish to GitHub Release
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          #!/bin/bash
          set -euo pipefail
          RELEASE_TAG="${{ steps.release.outputs.tag }}"
          RELEASE_VERSION="${{ steps.release.outputs.version }}"
          
          # Find only the compiled installers and metadata files, not the uncompressed folders
          shopt -s nullglob
          files=(release/*.exe release/*.dmg release/*.zip release/*.AppImage release/*.deb release/*.yml release/*.blockmap)
          
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No installer files found." >&2
            exit 1
          fi
          
          echo "Publishing ${#files[@]} files to release ${RELEASE_TAG}"
          
          # Create or update release
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} exists, uploading files..."
          else
            echo "Creating new release ${RELEASE_TAG}..."
            cat > release-notes.md <<NOTES
          Automated AnimeVault installer release for ${RELEASE_TAG}.
          
          Download page links use the stable latest-release URLs, for example:
          - https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/AnimeVault-Windows-x64.exe
          - https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/AnimeVault-Android.apk
          
          Built from commit ${GITHUB_SHA}.
          NOTES
            
            gh release create "${RELEASE_TAG}" \
              --target "${GITHUB_SHA}" \
              --title "AnimeVault ${RELEASE_TAG}" \
              --notes-file release-notes.md \
              --latest
          fi
          
          # Delete existing Info.plist if present to avoid duplicate errors
          existing_ids=$(gh release view "${RELEASE_TAG}" --json assets --jq '.assets[] | select(.name=="Info.plist") | .id')
          for id in $existing_ids; do
            gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/${id}"
          done
          
          echo "Uploading ${#files[@]} files..."
          gh release upload "${RELEASE_TAG}" "${files[@]}" --clobber
          
          echo "✅ Successfully published ${#files[@]} files to ${RELEASE_TAG}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  android:
    name: Android APK
    runs-on: ubuntu-latest
    needs: [version-bump]
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0
          ndk: 26.1.11579264
          platform-tools: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Ensure Android project exists
        run: npm run android:ensure

      - name: Build Android release APK
        run: npm run android:build

      - name: Normalize APK asset name
        shell: bash
        run: |
          #!/bin/bash
          set -euo pipefail
          mkdir -p release
          apks=()
          while IFS= read -r -d '' apk; do
            apks+=("$apk")
          done < <(find android/app/build/outputs/apk/release -maxdepth 1 -name '*.apk' -print0 2>/dev/null | sort -z)
          if [ "${#apks[@]}" -eq 0 ]; then
            echo "No Android release APK was produced." >&2
            exit 1
          fi
          cp "${apks[0]}" "release/AnimeVault-Android.apk"

      # Publish Android APK immediately (don't wait for desktop builds)
      - name: Resolve version tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          tag="v${version}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Publish Android APK to GitHub Release
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          #!/bin/bash
          set -euo pipefail
          RELEASE_TAG="${{ steps.release.outputs.tag }}"
          
          echo "Publishing Android APK to release ${RELEASE_TAG}"
          
          # Create or update release
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} exists, uploading APK..."
          else
            echo "Creating new release ${RELEASE_TAG}..."
            cat > release-notes.md <<NOTES
          Automated AnimeVault installer release for ${RELEASE_TAG}.
          
          Download page links use the stable latest-release URLs, for example:
          - https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/AnimeVault-Windows-x64.exe
          - https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/AnimeVault-Android.apk
          
          Built from commit ${GITHUB_SHA}.
          NOTES
            
            gh release create "${RELEASE_TAG}" \
              --target "${GITHUB_SHA}" \
              --title "AnimeVault ${RELEASE_TAG}" \
              --notes-file release-notes.md \
              --latest
          fi
          
          # Upload APK (--clobber replaces if exists)
          gh release upload "${RELEASE_TAG}" "release/AnimeVault-Android.apk" --clobber
          
          echo "✅ Successfully published Android APK to ${RELEASE_TAG}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
