name: Automated Installer Builds

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: installer-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  desktop:
    name: Desktop installer (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            args: --win
          - os: macos-latest
            name: macOS
            args: --mac
          - os: ubuntu-latest
            name: Linux
            args: --linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Cache Electron downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-${{ runner.os }}-

      - name: Install ImageMagick (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Install ImageMagick (macOS)
        if: runner.os == 'macOS'
        run: brew install imagemagick

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run electron:build -- ${{ matrix.args }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: animevault-${{ matrix.name }}-installer
          if-no-files-found: error
          retention-days: 14
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.deb
            release/*.yml
            release/*.blockmap

  android:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Ensure Android project exists
        run: npm run android:ensure

      - name: Build Android release APK
        run: npm run android:build

      - name: Normalize APK asset name
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          mapfile -t apks < <(find android/app/build/outputs/apk/release -maxdepth 1 -name '*.apk' 2>/dev/null | sort)
          if [ "${#apks[@]}" -eq 0 ]; then
            echo "No Android release APK was produced." >&2
            exit 1
          fi
          cp "${apks[0]}" "release/AnimeVault-Android.apk"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: animevault-Android-apk
          if-no-files-found: error
          retention-days: 14
          path: release/AnimeVault-Android.apk
