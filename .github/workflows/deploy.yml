name: Deploy to GitHub Pages

# Pushes the built Vite bundle to the `gh-pages` branch of the repository,
# which GitHub Pages is configured to serve.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

# Avoid deploying multiple concurrent jobs; cancel in-progress ones
concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build production bundle
        run: npm run build

      - name: Make sure no Jekyll processing runs on the published site
        run: touch dist/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          keep_files: false
          force_orphan: true
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_message: "deploy: GitHub Pages bundle from ${{ github.sha }}"
